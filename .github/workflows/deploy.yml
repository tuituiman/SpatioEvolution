name: 🚀 Deploy SpatioEvolution to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ─── Job 1: Quality & Security Checks ───────────────────────────────────────
  quality:
    name: 🔍 Quality & Security
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔒 Security Audit (High severity only)
        # ใช้ --audit-level=high เพื่อไม่ fail จาก moderate CVE ใน xlsx
        run: npm audit --audit-level=high
        continue-on-error: true   # แจ้งเตือนแต่ไม่ block deploy

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Type Check
        run: npx tsc --noEmit

      - name: ✅ Unit Tests + Coverage
        run: npm run test:coverage

  # ─── Job 2: Build & Deploy ───────────────────────────────────────────────────
  build-and-deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    needs: quality          # รอ quality check ผ่านก่อน
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build

      - name: 📄 Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: 🗃️ Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

