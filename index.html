    <!-- Content Security Policy -->

      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com;
               font-src 'self' https://fonts.gstatic.com;
               img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://server.arcgisonline.com;
               connect-src 'self' blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://server.arcgisonline.com https://fonts.gstatic.com;
               worker-src 'self' blob:;
               media-src 'self' blob:;" />
